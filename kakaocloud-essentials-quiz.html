<!-- KakaoCloud Certified Essentials (Practitioner) — Practice Exam -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>카카오클라우드 Certified Essentials 모의고사</title>
<style>
  :root{
    --paper:#EEF1F4; --surface:#FFFFFF; --surface-2:#F7F8FA;
    --ink:#16202C; --ink-soft:#52616F; --ink-faint:#8493A1;
    --line:#E3E7EC; --line-strong:#D2D8DF;
    --accent:#F4B400; --accent-deep:#B97F00; --accent-wash:#FDF3D4;
    --correct:#13935F; --correct-wash:#E6F5EE; --correct-line:#9FD9BF;
    --wrong:#D83A3F; --wrong-wash:#FBECEC; --wrong-line:#EBB4B5;
    --radius:14px; --shadow:0 1px 2px rgba(20,32,44,.05), 0 8px 28px rgba(20,32,44,.07);
    --maxw:1080px;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",Roboto,sans-serif;
    --mono:"SFMono-Regular",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;padding:clamp(16px,4vw,40px)}
  .wrap{max-width:var(--maxw);margin:0 auto}
  button{font-family:inherit;cursor:pointer}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  .masthead{display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .mono-tile{width:42px;height:42px;border-radius:11px;background:var(--ink);color:var(--accent);display:grid;place-items:center;font-weight:800;font-size:18px;letter-spacing:-.5px;flex:none}
  .mh-eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-deep)}
  .mh-title{font-size:18px;font-weight:750;letter-spacing:-.01em;line-height:1.2}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}

  .hero{padding:clamp(24px,5vw,44px)}
  .hero h1{font-size:clamp(25px,4.4vw,38px);line-height:1.1;letter-spacing:-.02em;margin:0 0 14px;font-weight:800}
  .hero h1 .hl{color:var(--accent-deep)}
  .hero p.lead{font-size:16px;color:var(--ink-soft);margin:0 0 24px;max-width:56ch}
  .tabs{display:inline-flex;border:1px solid var(--line-strong);border-radius:12px;overflow:hidden;margin-bottom:26px}
  .tabs button{border:0;background:var(--surface);padding:11px 20px;font-size:14px;font-weight:700;color:var(--ink-soft);border-right:1px solid var(--line-strong)}
  .tabs button:last-child{border-right:0}
  .tabs button[aria-pressed="true"]{background:var(--ink);color:#fff}

  .field{margin-bottom:22px}
  .field > label.lab{display:block;font-size:12.5px;font-weight:750;letter-spacing:.02em;color:var(--ink);margin-bottom:10px}
  .field .hint{font-weight:500;color:var(--ink-faint);letter-spacing:0}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line-strong);background:var(--surface);color:var(--ink-soft);padding:7px 13px;border-radius:999px;font-size:13px;font-weight:600;transition:.15s}
  .chip:hover{border-color:var(--ink-faint)}
  .chip[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff}
  .chip .n{opacity:.6;font-weight:600;margin-left:5px;font-size:11.5px}
  .seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:10px;overflow:hidden;flex-wrap:wrap}
  .seg button{border:0;background:var(--surface);padding:9px 16px;font-size:13.5px;font-weight:650;color:var(--ink-soft);border-right:1px solid var(--line-strong)}
  .seg button:last-child{border-right:0}
  .seg button[aria-pressed="true"]{background:var(--accent-wash);color:var(--accent-deep)}
  .toggle{display:inline-flex;align-items:center;gap:10px;font-size:14px;font-weight:600;color:var(--ink);user-select:none}
  .switch{width:42px;height:24px;border-radius:999px;background:var(--line-strong);position:relative;transition:.2s;flex:none}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .toggle[aria-pressed="true"] .switch{background:var(--accent)}
  .toggle[aria-pressed="true"] .switch::after{left:21px}

  .blueprint{width:100%;border-collapse:collapse;font-size:13px;margin:4px 0 26px}
  .blueprint th,.blueprint td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:right}
  .blueprint th:first-child,.blueprint td:first-child{text-align:left}
  .blueprint thead th{font-size:11px;font-weight:700;letter-spacing:.04em;color:var(--ink-faint);text-transform:uppercase}
  .blueprint tbody tr:last-child td{border-bottom:0}
  .blueprint .hi td{background:var(--accent-wash);font-weight:700}
  .blueprint tfoot td{border-top:2px solid var(--line-strong);font-weight:800}

  .btn-primary{appearance:none;border:0;background:var(--accent);color:#1c1404;font-weight:800;font-size:15.5px;padding:15px 26px;border-radius:12px;letter-spacing:-.01em;transition:.15s;box-shadow:0 2px 0 var(--accent-deep)}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 0 var(--accent-deep)}
  .btn-primary:active{transform:translateY(1px);box-shadow:0 1px 0 var(--accent-deep)}
  .btn-ghost{appearance:none;background:var(--surface);border:1px solid var(--line-strong);color:var(--ink);font-weight:650;font-size:14px;padding:12px 18px;border-radius:11px;transition:.15s}
  .btn-ghost:hover{border-color:var(--ink-faint)}
  .share-note{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:16px;font-size:13px;color:var(--ink-faint)}

  .exam{display:grid;grid-template-columns:1fr 268px;gap:20px;align-items:start}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px}
  .progress-meta{font-size:13px;color:var(--ink-soft);font-weight:600}
  .progress-meta b{color:var(--ink)}
  .pbar{height:7px;background:var(--line);border-radius:99px;overflow:hidden;flex:1;max-width:320px}
  .pbar > i{display:block;height:100%;background:var(--accent);width:0;transition:width .3s}
  .qcard{padding:clamp(22px,3.4vw,34px)}
  .eyebrow{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:14px}
  .qnum{font-family:var(--mono);color:var(--ink-faint);font-size:12px;font-weight:700}
  .cat{background:var(--surface-2);border:1px solid var(--line);color:var(--ink-soft);padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.03em}
  .pt{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:800;letter-spacing:.02em}
  .pt1{background:var(--correct-wash);color:var(--correct);border:1px solid var(--correct-line)}
  .pt2{background:var(--accent-wash);color:var(--accent-deep);border:1px solid #e7cf86}
  .pt3{background:var(--ink);color:var(--accent)}
  .qtext{font-size:18px;font-weight:650;line-height:1.5;letter-spacing:-.01em;margin:0}
  .opts{list-style:none;padding:0;margin:22px 0 0;display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:13px;align-items:flex-start;width:100%;text-align:left;border:1.5px solid var(--line);background:var(--surface);border-radius:12px;padding:14px 15px;transition:.13s;color:var(--ink);font-size:15px;line-height:1.5}
  .opt:hover{border-color:var(--accent);background:#fffdf6}
  .opt .key{flex:none;width:26px;height:26px;display:grid;place-items:center;font-weight:750;font-size:15px;color:var(--ink-faint);transition:.13s}
  .opt[aria-pressed="true"]{border-color:var(--accent);background:var(--accent-wash)}
  .opt[aria-pressed="true"] .key{color:var(--accent-deep)}
  .navbtns{display:flex;justify-content:space-between;gap:12px;margin-top:26px}

  .side{position:sticky;top:20px;padding:18px}
  .side h3{font-size:12px;font-weight:750;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin:0 0 4px}
  .side .sub{font-size:12px;color:var(--ink-faint);margin:0 0 14px}
  .omr{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
  .cell{aspect-ratio:1;border:1.5px solid var(--line-strong);background:var(--surface);border-radius:8px;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink-soft);display:grid;place-items:center;transition:.12s}
  .cell:hover{border-color:var(--ink-faint)}
  .cell.answered{background:var(--accent);border-color:var(--accent);color:#1c1404}
  .cell.current{outline:2px solid var(--ink);outline-offset:1px}
  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin:16px 0 0;font-size:11.5px;color:var(--ink-soft)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:11px;height:11px;border-radius:4px;border:1.5px solid var(--line-strong);background:var(--surface)}
  .dot.a{background:var(--accent);border-color:var(--accent)}
  .side .submit{width:100%;margin-top:18px}
  .answered-count{font-size:12.5px;color:var(--ink-soft);text-align:center;margin-top:10px}

  .result-head{padding:clamp(26px,4vw,40px);display:flex;gap:30px;align-items:center;flex-wrap:wrap}
  .ring{--p:0;flex:none;width:150px;height:150px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--ring-c,var(--accent)) calc(var(--p)*1%), var(--line) 0)}
  .ring > div{width:118px;height:118px;border-radius:50%;background:var(--surface);display:grid;place-items:center}
  .ring .pct{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1}
  .ring .pl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-top:4px}
  .verdict h2{font-size:23px;font-weight:800;letter-spacing:-.02em;margin:0 0 6px}
  .verdict p{margin:0;color:var(--ink-soft);font-size:14.5px}
  .badge-pass{display:inline-block;font-size:12px;font-weight:750;padding:4px 11px;border-radius:7px;margin-bottom:10px}
  .badge-pass.high{background:var(--correct);color:#fff}
  .badge-pass.pass{background:var(--correct-wash);color:var(--correct)}
  .badge-pass.fail{background:var(--wrong-wash);color:var(--wrong)}
  .breakdown{padding:0 clamp(26px,4vw,40px) clamp(18px,3vw,26px)}
  .breakdown h3{font-size:12px;font-weight:750;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);margin:18px 0 14px}
  .br-row{display:grid;grid-template-columns:130px 1fr 70px;gap:12px;align-items:center;margin-bottom:9px;font-size:13px}
  .br-row .nm{color:var(--ink);font-weight:600}
  .br-bar{height:8px;background:var(--line);border-radius:99px;overflow:hidden}
  .br-bar > i{display:block;height:100%;border-radius:99px}
  .br-row .sc{text-align:right;font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
  .actions{display:flex;flex-wrap:wrap;gap:10px;padding:clamp(20px,3vw,28px);border-top:1px solid var(--line)}

  .review-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:26px 0 14px;flex-wrap:wrap}
  .review-head h2{font-size:19px;font-weight:800;letter-spacing:-.01em;margin:0}
  .filter-seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:9px;overflow:hidden}
  .filter-seg button{border:0;background:var(--surface);padding:8px 15px;font-size:13px;font-weight:650;color:var(--ink-soft);border-right:1px solid var(--line-strong)}
  .filter-seg button:last-child{border-right:0}
  .filter-seg button[aria-pressed="true"]{background:var(--ink);color:#fff}
  .rev{padding:20px 22px;margin-bottom:12px}
  .rev .rtop{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .rev .tag{font-size:11px;font-weight:750;letter-spacing:.03em;padding:3px 9px;border-radius:6px}
  .rev .tag.ok{background:var(--correct-wash);color:var(--correct)}
  .rev .tag.no{background:var(--wrong-wash);color:var(--wrong)}
  .rev .tag.cat{background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line)}
  .rev .rq{font-size:15.5px;font-weight:650;line-height:1.5;margin:0 0 14px}
  .rev .rq .qnum{font-family:var(--mono);color:var(--ink-faint);margin-right:8px}
  .rev .ro{display:flex;gap:11px;align-items:flex-start;padding:10px 13px;border-radius:9px;border:1.5px solid var(--line);font-size:14px;margin-bottom:7px;line-height:1.45}
  .rev .ro .k{flex:none;font-weight:750;font-size:15px;color:var(--ink-soft)}
  .rev .ro.correct{border-color:var(--correct-line);background:var(--correct-wash)}
  .rev .ro.correct .k{color:var(--correct)}
  .rev .ro.chosen-wrong{border-color:var(--wrong-line);background:var(--wrong-wash)}
  .rev .ro.chosen-wrong .k{color:var(--wrong)}
  .rev .ro .mark{margin-left:auto;font-size:11.5px;font-weight:700;align-self:center}
  .rev .ro.correct .mark{color:var(--correct)}
  .rev .ro.chosen-wrong .mark{color:var(--wrong)}
  .rev .exp{margin-top:12px;padding:13px 15px;background:var(--surface-2);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:9px;font-size:13.5px;color:var(--ink-soft);line-height:1.55}
  .rev .exp b{color:var(--ink);font-weight:700}

  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:11px;font-size:14px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:.25s;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  footer{margin:34px 0 8px;text-align:center;font-size:12px;color:var(--ink-faint);line-height:1.7}

  @media (max-width:820px){
    .exam{grid-template-columns:1fr}
    .side{position:static;order:-1}
    .omr{grid-template-columns:repeat(10,1fr)}
    .ring{width:120px;height:120px}.ring>div{width:94px;height:94px}.ring .pct{font-size:26px}
    .br-row{grid-template-columns:96px 1fr 64px}
  }
</style>

<div class="wrap">
  <div class="masthead">
    <div class="mono-tile">kc</div>
    <div>
      <div class="mh-eyebrow">KakaoCloud Certified Essentials · Practitioner</div>
      <div class="mh-title">실전 모의고사</div>
    </div>
  </div>
  <div id="app"></div>
  <footer>
    KakaoCloud 공식 문서 및 학습 가이드의 출제 구조(60문항·100점, 합격 70점)를 바탕으로 구성한 학습용 자료입니다.<br>실제 시험 문항·범위 전체를 대체하지 않습니다.
  </footer>
</div>

<script>
/* ====================== 시험 청사진 (가이드 기반) ====================== */
/* 영역: [1점 수, 2점 수, 3점 수]  → 합계 60문항 / 100점 */
const BLUEPRINT = {
  "클라우드 개요":[6,5,2],
  "서비스 이해":[8,7,1],
  "비용·요금":[4,3,1],
  "보안·권한":[4,4,1],
  "운영·모니터링":[3,2,1],
  "계정 관리":[1,1,1],
  "기타·복합":[2,2,1],
};
const AREAS = Object.keys(BLUEPRINT);
const PASS = 70, HIGH = 90; // 100점 만점 기준

/* ====================== 문제 은행 ======================
   area=영역, pt=배점(1/2/3), opts=4지선다, ans=정답 인덱스(0~3) */
const BANK = [
{area:"클라우드 개요",pt:1,q:"클라우드 컴퓨팅에서 사용한 만큼만 비용을 지불하는 과금 방식은?",opts:["종량제", "예약 약정제(Reserved)", "정액 정기 구독제", "선불 충전제"],ans:0,exp:"종량제(pay-as-you-go)는 사용한 리소스만큼만 비용을 지불하는 클라우드의 대표 과금 방식이다."},
{area:"클라우드 개요",pt:1,q:"서버·스토리지·네트워크 등 인프라를 가상화해 제공하는 클라우드 서비스 모델은?",opts:["PaaS", "IaaS", "SaaS", "FaaS"],ans:1,exp:"IaaS는 컴퓨팅·스토리지·네트워크 같은 인프라 자원을 가상화해 제공하는 모델이다."},
{area:"클라우드 개요",pt:1,q:"완성된 소프트웨어를 설치 없이 인터넷으로 바로 사용하는 모델은?",opts:["PaaS", "IaaS", "SaaS", "BaaS"],ans:2,exp:"SaaS는 완성된 애플리케이션을 인터넷을 통해 바로 사용하는 모델이다(예: 웹메일)."},
{area:"클라우드 개요",pt:1,q:"지리적으로 떨어진 데이터센터들의 묶음으로, 서비스가 제공되는 큰 지역 단위는?",opts:["가용 영역(AZ)", "엣지 로케이션", "서브넷", "리전(Region)"],ans:3,exp:"리전은 지리적으로 분리된 데이터센터 집합 단위다."},
{area:"클라우드 개요",pt:1,q:"하나의 리전 안에서 전력·네트워크가 독립적으로 격리된 인프라 단위는?",opts:["가용 영역(AZ)", "리전(Region)", "엣지 로케이션", "서브넷"],ans:0,exp:"가용 영역(AZ)은 리전 내에서 물리적으로 분리·격리된 독립 인프라 단위로, 장애 격리에 활용된다."},
{area:"클라우드 개요",pt:1,q:"여러 사용자가 공용 클라우드 인프라를 공유해 사용하는 배포 모델은?",opts:["프라이빗 클라우드", "퍼블릭 클라우드", "하이브리드 클라우드", "멀티 클라우드"],ans:1,exp:"퍼블릭 클라우드는 다수 사용자가 공용 인프라를 공유하는 배포 모델이다."},
{area:"클라우드 개요",pt:1,q:"온프레미스 환경과 퍼블릭 클라우드를 함께 연계해 사용하는 배포 모델은?",opts:["퍼블릭 클라우드", "프라이빗 클라우드", "하이브리드 클라우드", "멀티 클라우드"],ans:2,exp:"하이브리드 클라우드는 온프레미스와 퍼블릭 클라우드를 연계해 함께 활용하는 모델이다."},
{area:"클라우드 개요",pt:2,q:"PaaS 모델에서 사용자가 주로 책임지고 관리하는 범위로 가장 적절한 것은?",opts:["운영체제와 런타임", "하이퍼바이저와 물리 서버", "데이터센터 전력·냉각 설비", "애플리케이션과 데이터"],ans:3,exp:"PaaS는 OS·런타임·인프라를 제공자가 관리하고, 사용자는 애플리케이션과 데이터에 집중한다."},

function shuffleArr(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function bankBy(area,pt){return BANK.filter(q=>q.area===area&&q.pt===pt);}

function buildQ(src){const order=cfg.shuffle?shuffleArr(src.opts.map((_,i)=>i)):src.opts.map((_,i)=>i);

  graded=false;
  const totalQ=BANK.length;
  // 실전 청사진 표
  const rows=AREAS.map(a=>{const [b1,b2,b3]=BLUEPRINT[a];const n=b1+b2+b3;const p=b1+b2*2+b3*3;
    return `<tr class="${a==='서비스 이해'?'hi':''}"><td>${a}</td><td>${n}</td><td>${p}</td><td>${b1}·${b2}·${b3}</td></tr>`;}).join("");
  const practiceCounts={}; AREAS.forEach(a=>practiceCounts[a]=BANK.filter(q=>q.area===a).length);

  app().innerHTML=`
  <div class="card hero">
    <div class="mh-eyebrow" style="margin-bottom:10px">Practitioner · Level Essentials</div>
    <h1>합격선 <span class="hl">70점</span>, 한 번에 점검하는<br>카카오클라우드 기초 실력</h1>
    <p class="lead">실제 시험 구조(60문항·100점, 1점·2점·3점 배점)와 Exam Blueprint의 영역별 추천 학습 주제를 반영했습니다. 실전 모드는 영역·배점 비율을 청사진대로 구성하고, 채점 후 오답만 모아 학습 주제와 함께 복습할 수 있습니다.</p>

    <div class="tabs" id="modeTabs">
      <button data-m="exam" aria-pressed="${cfg.mode==='exam'}">실전 모의고사 · 60문항</button>
      <button data-m="practice" aria-pressed="${cfg.mode==='practice'}">영역별 연습</button>
    </div>

    <div id="modeBody"></div>

    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:6px">
      <button class="btn-primary" id="startBtn"></button>
      <button class="btn-ghost" id="copyLinkBtn">공유 링크 복사</button>
    </div>
    <div class="share-note">이 페이지 주소를 그대로 보내면 누구나 같은 시험을 풀 수 있어요.</div>
  </div>`;

  function renderModeBody(){
    const body=$("#modeBody");
    if(cfg.mode==="exam"){
      body.innerHTML=`
        <table class="blueprint">
          <thead><tr><th>평가 영역</th><th>문항</th><th>배점</th><th>1·2·3점</th></tr></thead>
          <tbody>${rows}</tbody>
          <tfoot><tr><td>합계</td><td>60</td><td>100</td><td>28·24·8</td></tr></tfoot>
        </table>
        <div class="field">
          <button class="toggle" id="shuffleTog" aria-pressed="${cfg.shuffle}"><span class="switch"></span> 문항·보기 순서 섞기</button>
        </div>`;
      $("#startBtn").textContent="실전 시험 시작 · 60문항 / 100점";
    } else {
      body.innerHTML=`
        <div class="field">
          <label class="lab">출제 영역 <span class="hint">— 선택하지 않으면 전체</span></label>
          <div class="chips" id="areaChips">
            ${AREAS.map(a=>`<button class="chip" data-a="${a}" aria-pressed="${cfg.areas.has(a)}">${a}<span class="n">${practiceCounts[a]}</span></button>`).join("")}
          </div>
        </div>
        <div class="field">
          <label class="lab">배점(난이도)</label>
          <div class="seg" id="ptSeg">
            <button data-p="all" aria-pressed="${cfg.pt==='all'}">전체</button>
            <button data-p="1" aria-pressed="${cfg.pt==='1'}">1점 · 개념</button>
            <button data-p="2" aria-pressed="${cfg.pt==='2'}">2점 · 활용</button>
            <button data-p="3" aria-pressed="${cfg.pt==='3'}">3점 · 시나리오</button>
          </div>
        </div>
        <div class="field">
          <label class="lab">문항 수</label>
          <div class="seg" id="countSeg">
            <button data-c="10" aria-pressed="${cfg.count==='10'}">10문항</button>
            <button data-c="20" aria-pressed="${cfg.count==='20'}">20문항</button>
            <button data-c="all" aria-pressed="${cfg.count==='all'}">전체</button>
          </div>
        </div>
        <div class="field">
          <button class="toggle" id="shuffleTog" aria-pressed="${cfg.shuffle}"><span class="switch"></span> 문항·보기 순서 섞기</button>
        </div>`;
      const refresh=()=>{const pool=poolPractice().length;const n=cfg.count==="all"?pool:Math.min(Number(cfg.count),pool);$("#startBtn").textContent=`연습 시작 · ${n}문항`;};
      body.querySelectorAll("#areaChips .chip").forEach(b=>b.onclick=()=>{const a=b.dataset.a,on=b.getAttribute("aria-pressed")==="true";b.setAttribute("aria-pressed",String(!on));on?cfg.areas.delete(a):cfg.areas.add(a);refresh();});
      body.querySelectorAll("#ptSeg button").forEach(b=>b.onclick=()=>{body.querySelectorAll("#ptSeg button").forEach(x=>x.setAttribute("aria-pressed","false"));b.setAttribute("aria-pressed","true");cfg.pt=b.dataset.p;refresh();});
      body.querySelectorAll("#countSeg button").forEach(b=>b.onclick=()=>{body.querySelectorAll("#countSeg button").forEach(x=>x.setAttribute("aria-pressed","false"));b.setAttribute("aria-pressed","true");cfg.count=b.dataset.c;refresh();});
      refresh();
    }
    $("#shuffleTog").onclick=function(){cfg.shuffle=!cfg.shuffle;this.setAttribute("aria-pressed",String(cfg.shuffle));};
  }
  renderModeBody();

  $("#modeTabs").querySelectorAll("button").forEach(b=>b.onclick=()=>{
    cfg.mode=b.dataset.m;$("#modeTabs").querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed",String(x.dataset.m===cfg.mode)));renderModeBody();});
  $("#startBtn").onclick=startQuiz;
  $("#copyLinkBtn").onclick=copyLink;
}

/* ====================== 시험 구성 ====================== */
function startQuiz(){
  let chosen=[];
  if(cfg.mode==="exam"){
    AREAS.forEach(a=>{const [b1,b2,b3]=BLUEPRINT[a];
      [[1,b1],[2,b2],[3,b3]].forEach(([pt,need])=>{
        let pool=bankBy(a,pt); pool=shuffleArr(pool); chosen=chosen.concat(pool.slice(0,need));
      });
    });
    chosen=shuffleArr(chosen); // 출제 순서 섞기(실전은 항상 셔플)
  } else {
    let pool=poolPractice(); pool=cfg.shuffle?shuffleArr(pool):pool;
    const n=cfg.count==="all"?pool.length:Math.min(Number(cfg.count),pool.length);
    chosen=pool.slice(0,n);
  }
  quiz=chosen.map(buildQ);
  userAns=quiz.map(()=>-1); cur=0; graded=false; startedAt=Date.now();
  window.scrollTo(0,0); renderExam();
}

/* ====================== 시험 화면 ====================== */
function renderExam(){
  const q=quiz[cur];
  const answered=userAns.filter(a=>a>=0).length;
  app().innerHTML=`
  <div class="topbar">
    <div class="progress-meta">문항 <b>${cur+1}</b> / ${quiz.length}${cfg.mode==='exam'?' · 실전':''}</div>
    <div class="pbar"><i style="width:${((cur+1)/quiz.length)*100}%"></i></div>
    <button class="btn-ghost" id="quitBtn" style="padding:8px 14px;font-size:13px">시작 화면</button>
  </div>
  <div class="exam">
    <div class="card qcard">
      <div class="eyebrow">
        <span class="qnum">Q${String(cur+1).padStart(2,"0")}</span>
        <span class="cat">${q.area}</span>
        <span class="pt pt${q.pt}">${q.pt}점</span>
      </div>
      <p class="qtext">${q.q}</p>
      <ul class="opts" id="opts">
        ${q.opts.map((o,i)=>`<li><button class="opt" data-i="${i}" aria-pressed="${userAns[cur]===i}"><span class="key">${KEY[i]}</span><span class="body">${o}</span></button></li>`).join("")}
      </ul>
      <div class="navbtns">
        <button class="btn-ghost" id="prevBtn" ${cur===0?"disabled style=opacity:.4;cursor:not-allowed":""}>← 이전</button>
        ${cur===quiz.length-1?`<button class="btn-primary" id="submitBtn">채점하기</button>`:`<button class="btn-ghost" id="nextBtn">다음 →</button>`}
      </div>
    </div>
    <aside class="card side">
      <h3>답안지</h3>
      <p class="sub">번호를 눌러 이동할 수 있어요</p>
      <div class="omr" id="omr">
        ${quiz.map((_,i)=>`<button class="cell ${userAns[i]>=0?"answered":""} ${i===cur?"current":""}" data-i="${i}">${i+1}</button>`).join("")}
      </div>
      <div class="legend"><span><i class="dot a"></i> 답함</span><span><i class="dot"></i> 미응답</span></div>
      <button class="btn-primary submit" id="submitBtn2">채점하기</button>
      <div class="answered-count">응답 완료 <b>${answered}</b> / ${quiz.length}</div>
    </aside>
  </div>`;

  $("#opts").querySelectorAll(".opt").forEach(b=>b.onclick=()=>{userAns[cur]=Number(b.dataset.i);renderExam();});
  $("#omr").querySelectorAll(".cell").forEach(b=>b.onclick=()=>{cur=Number(b.dataset.i);renderExam();});
  if($("#prevBtn"))$("#prevBtn").onclick=()=>{if(cur>0){cur--;renderExam();}};
  if($("#nextBtn"))$("#nextBtn").onclick=()=>{if(cur<quiz.length-1){cur++;renderExam();}};
  const submit=()=>{const un=userAns.filter(a=>a<0).length;
    if(un>0&&!confirm(`미응답 ${un}문항이 있습니다. 그대로 채점할까요?`))return;
    graded=true;window.scrollTo(0,0);renderResults();};
  if($("#submitBtn"))$("#submitBtn").onclick=submit;
  if($("#submitBtn2"))$("#submitBtn2").onclick=submit;
  $("#quitBtn").onclick=()=>{if(confirm("시작 화면으로 돌아가면 현재 풀이가 사라집니다. 계속할까요?"))renderStart();};
}

/* ====================== 결과 ====================== */
function renderResults(){
  const e=earned(), t=totalPts(), pct=Math.round(e/t*100);
  const high=pct>=HIGH, pass=pct>=PASS;
  const ringC=high?"var(--correct)":(pass?"var(--accent)":"var(--wrong)");
  const correctN=quiz.reduce((s,q,i)=>s+(userAns[i]===q.ans?1:0),0);
  const secs=Math.max(1,Math.round((Date.now()-startedAt)/1000));
  const tstr=`${Math.floor(secs/60)}분 ${secs%60}초`;
  const isExam=cfg.mode==="exam";

  // 영역별(배점) 정답률
  const areaAgg={};
  quiz.forEach((q,i)=>{(areaAgg[q.area]??=(areaAgg[q.area]={got:0,tot:0}));areaAgg[q.area].tot+=q.pt;if(userAns[i]===q.ans)areaAgg[q.area].got+=q.pt;});
  const areaRows=Object.entries(areaAgg).map(([a,v])=>{const p=Math.round(v.got/v.tot*100);const col=p>=PASS?"var(--correct)":(p>=50?"var(--accent)":"var(--wrong)");
    return `<div class="br-row"><span class="nm">${a}</span><div class="br-bar"><i style="width:${p}%;background:${col}"></i></div><span class="sc">${v.got}/${v.tot}점</span></div>`;}).join("");

  // 배점별 정답 수
  const ptAgg={1:{c:0,t:0},2:{c:0,t:0},3:{c:0,t:0}};
  quiz.forEach((q,i)=>{ptAgg[q.pt].t++;if(userAns[i]===q.ans)ptAgg[q.pt].c++;});
  const ptRows=[1,2,3].filter(p=>ptAgg[p].t>0).map(p=>{const v=ptAgg[p];const pc=Math.round(v.c/v.t*100);const col=pc>=PASS?"var(--correct)":(pc>=50?"var(--accent)":"var(--wrong)");
    const lbl={1:"1점 · 개념",2:"2점 · 활용",3:"3점 · 시나리오"}[p];
    return `<div class="br-row"><span class="nm">${lbl}</span><div class="br-bar"><i style="width:${pc}%;background:${col}"></i></div><span class="sc">${v.c}/${v.t}개</span></div>`;}).join("");

  const verdictMsg = isExam
    ? (high?"고득점입니다. 핵심 개념이 탄탄해요.":(pass?"합격선을 넘었어요. 오답만 마저 다지면 고득점도 가능합니다.":"합격선(70점)까지 조금 더. 오답 노트를 중심으로 약한 영역을 보강해 보세요."))
    : (pass?"잘하고 있어요. 오답만 모아 마무리 점검해 보세요.":"오답 노트를 중심으로 해당 영역을 다시 보면 빠르게 끌어올릴 수 있어요.");

  app().innerHTML=`
  <div class="card">
    <div class="result-head">
      <div class="ring" style="--p:${pct};--ring-c:${ringC}"><div><span class="pct">${e}<span style="font-size:16px;color:var(--ink-faint)">/${t}</span></span></div></div>
      <div class="verdict">
        <span class="badge-pass ${high?'high':(pass?'pass':'fail')}">${high?'고득점':(pass?'합격':'합격선 미달')}${isExam?` · 합격 ${PASS} / 고득점 ${HIGH}`:` · 기준 ${PASS}%`}</span>
        <h2>${t}점 만점 중 ${e}점 (환산 ${pct}%)</h2>
        <p>정답 ${correctN} / ${quiz.length}문항 · 소요 ${tstr}<br>${verdictMsg}</p>
      </div>
    </div>
    <div class="breakdown">
      <h3>영역별 득점</h3>${areaRows}
      <h3>배점별 정답</h3>${ptRows}
    </div>
    <div class="actions">
      ${correctN<quiz.length?`<button class="btn-primary" id="retryWrong">오답만 다시 풀기 (${quiz.length-correctN})</button>`:""}
      <button class="btn-ghost" id="retryAll">전체 다시 풀기</button>
      <button class="btn-ghost" id="newExam">시작 화면</button>
      <button class="btn-ghost" id="shareBtn">결과 공유</button>
    </div>
  </div>

  <div class="review-head">
    <h2>오답 노트 &amp; 해설</h2>
    <div class="filter-seg" id="filterSeg">
      <button data-f="wrong" aria-pressed="${reviewFilter==='wrong'}">오답만</button>
      <button data-f="all" aria-pressed="${reviewFilter==='all'}">전체</button>
    </div>
  </div>
  <div id="reviewList"></div>`;

  $("#filterSeg").querySelectorAll("button").forEach(b=>b.onclick=()=>{reviewFilter=b.dataset.f;$("#filterSeg").querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed",String(x.dataset.f===reviewFilter)));renderReview();});
  if($("#retryWrong"))$("#retryWrong").onclick=()=>{
    const wrong=quiz.filter((_,i)=>userAns[i]!==quiz[i].ans);
    quiz=wrong.map(q=>buildQ({area:q.area,pt:q.pt,topic:q.topic,q:q.q,exp:q.exp,opts:q.opts,ans:q.ans}));
    userAns=quiz.map(()=>-1);cur=0;graded=false;startedAt=Date.now();window.scrollTo(0,0);renderExam();};
  $("#retryAll").onclick=()=>{userAns=quiz.map(()=>-1);cur=0;graded=false;startedAt=Date.now();window.scrollTo(0,0);renderExam();};
  $("#newExam").onclick=renderStart;
  $("#shareBtn").onclick=()=>shareResult(e,t,pct);
  renderReview();
}

function renderReview(){
  const items=quiz.map((q,i)=>({q,i})).filter(({i})=>reviewFilter==="all"||userAns[i]!==quiz[i].ans);
  if(items.length===0){$("#reviewList").innerHTML=`<div class="card rev" style="text-align:center;color:var(--ink-soft)">오답이 없습니다. 완벽해요! '전체'로 전환하면 해설을 다시 볼 수 있어요.</div>`;return;}
  $("#reviewList").innerHTML=items.map(({q,i})=>{
    const ok=userAns[i]===q.ans, chosen=userAns[i];
    const opts=q.opts.map((o,oi)=>{const isAns=oi===q.ans,isChosen=oi===chosen;let cls="",mark="";
      if(isAns){cls="correct";mark="정답";}else if(isChosen){cls="chosen-wrong";mark="내 선택";}
      return `<div class="ro ${cls}"><span class="k">${KEY[oi]}</span><span>${o}</span>${mark?`<span class="mark">${mark}</span>`:""}</div>`;}).join("");
    return `<div class="card rev">
      <div class="rtop">
        <span class="tag ${ok?'ok':'no'}">${ok?'정답':'오답'}</span>
        <span class="tag cat">${q.area}</span>
        <span class="tag cat">${q.pt}점</span>
        ${q.topic?`<span class="tag cat" style="opacity:.85">📘 ${q.topic}</span>`:""}
      </div>
      <p class="rq"><span class="qnum">Q${String(i+1).padStart(2,"0")}</span>${q.q}</p>
      ${opts}
      <div class="exp"><b>해설.</b> ${q.exp}</div>
    </div>`;}).join("");
}

/* ====================== 공유 ====================== */
function toast(msg){let t=document.getElementById("toast");if(!t){t=document.createElement("div");t.id="toast";t.className="toast";document.body.appendChild(t);}t.textContent=msg;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),2200);}
function copyLink(){const url=location.href;if(navigator.clipboard&&location.protocol!=="file:"){navigator.clipboard.writeText(url).then(()=>toast("링크를 복사했어요 — 붙여넣어 공유하세요")).catch(()=>window.prompt("아래 주소를 복사해 공유하세요",url));}else{window.prompt("아래 주소를 복사해 공유하세요",url);}}
function shareResult(e,t,pct){const text=`카카오클라우드 Certified Essentials 모의고사 — ${t}점 만점 중 ${e}점 (${pct}%)`;const url=location.href;
  if(navigator.share){navigator.share({title:"카카오클라우드 Essentials 모의고사",text,url}).catch(()=>{});}
  else if(navigator.clipboard&&location.protocol!=="file:"){navigator.clipboard.writeText(text+"\n"+url).then(()=>toast("결과와 링크를 복사했어요")).catch(()=>window.prompt("복사해 공유하세요",text+"  "+url));}
  else{window.prompt("복사해 공유하세요",text+"  "+url);}}

renderStart();
</script>
